<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Werewolf Board Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-900 text-gray-100 min-h-screen overflow-hidden">
    <header class="bg-gray-800 p-4 shadow-xl border-b border-gray-700">
      <h1 class="text-red-500 font-black text-center tracking-tighter text-xl">
        WEREWOLF BOARD
      </h1>

      <div class="flex justify-around text-[10px] mt-2 font-mono">
        <span>TỔNG: <span id="total-count" class="text-blue-400">0</span></span>
        <span
          >SỐNG: <span id="alive-count" class="text-green-400">0</span></span
        >
        <span>CHẾT: <span id="dead-count" class="text-red-400">0</span></span>
      </div>

      <div class="mt-3 flex items-center gap-3 px-2">
        <span class="text-[9px] text-gray-400 uppercase">Kích thước:</span>
        <input
          type="range"
          id="zoom-slider"
          min="0.5"
          max="1.5"
          step="0.1"
          value="1"
          class="flex-1 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500"
        />
      </div>

      <button
        onclick="toggleLock()"
        id="lock-btn"
        class="w-full mt-3 text-[10px] font-bold bg-gray-700 py-2 rounded-full border border-gray-600 transition-colors"
      >
        🔓 CHẾ ĐỘ: ĐANG THIẾT KẾ (KÉO ĐƯỢC)
      </button>
    </header>

    <section class="p-3 bg-gray-800/50">
      <div class="flex gap-2">
        <input
          type="text"
          id="player-name"
          placeholder="Thêm tên người chơi..."
          class="flex-1 bg-gray-700 text-sm p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-red-500"
        />
        <button
          onclick="addPlayer()"
          class="bg-red-600 px-6 rounded-lg font-bold shadow-lg active:scale-90 transition-transform"
        >
          +
        </button>
      </div>
    </section>

    <div
      id="board-container"
      class="relative w-full h-[60vh] overflow-hidden bg-gray-900"
    >
      <div id="board" class="w-full h-full"></div>
    </div>

    <div class="fixed bottom-6 right-6">
      <button
        onclick="clearAll()"
        class="bg-gray-800 p-4 rounded-full shadow-2xl border border-gray-700 opacity-40 hover:opacity-100"
      >
        🗑️
      </button>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
